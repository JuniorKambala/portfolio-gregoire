<!DOCTYPE html>
<!-- Page Contact du portfolio de Grégoire -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Grégoire Lunkamba Shongo</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Barre de navigation principale -->
    <nav>
        <a href="index.html">Accueil</a>
        <a href="apropos.html">À propos</a>
        <a href="objectif.html">Objectif</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <!-- Contenu de la page Contact -->
    <section>
        <h2>Contact</h2>

        <form class="contact-form" action="https://formspree.io/f/xykowyna" method="POST">

            <!-- Champ obligatoire pour Netlify Forms -->
            <input type="hidden" name="form-name" value="contact">

            <div class="form-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Votre email" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Votre message" required></textarea>
            </div>

            <button type="submit">Envoyer</button>
        </form>

    </section>

    <script src="js/main.js"></script>
</body>
</html>
